<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChordFlow — Hand-Tracking Chord Controller</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.25);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(236,72,153,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(139,92,246,0.08) 0%, transparent 60%);
            animation: bgShift 20s ease-in-out infinite;
            z-index: -2;
        }

        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 1%) rotate(1deg); }
            66% { transform: translate(-1%, 2%) rotate(-1deg); }
        }

        #webcam {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
        }

        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 3;
            pointer-events: none;
        }

        .dim-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.15);
            z-index: 1;
            pointer-events: none;
        }

        /* ===== iOS LIQUID GLASS UI ===== */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
        }

        .glass-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ===== CHORD DISPLAY ===== */
        .chord-display {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
        }

        .chord-display.active {
            transform: translateX(-50%) scale(1.08);
        }

        .chord-display .chord-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #e0e7ff 50%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            min-height: 6rem;
            letter-spacing: -3px;
            text-shadow: 0 0 60px rgba(99,102,241,0.3);
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
        }

        .chord-display .chord-notes {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .chord-display .key-display {
            margin-top: 14px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* ===== WHEELS ===== */
        .wheel-label {
            position: fixed;
            z-index: 10;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.2);
            font-weight: 600;
            pointer-events: none;
            transition: color 0.3s;
        }

        .wheel-label.left {
            top: 20px;
            left: 50%;
            transform: translateX(-180px);
        }

        .wheel-label.right {
            top: 20px;
            left: 50%;
            transform: translateX(80px);
        }

        /* ===== HAND INDICATORS ===== */
        .hand-indicator {
            position: fixed;
            z-index: 15;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
            transition: all 0.3s;
        }

        .hand-indicator.left-hand {
            top: 60px;
            left: 50%;
            transform: translateX(-200px);
        }

        .hand-indicator.right-hand {
            top: 60px;
            left: 50%;
            transform: translateX(80px);
        }

        .hand-indicator.active {
            color: #fff;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .hand-indicator .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            margin-right: 8px;
            vertical-align: middle;
            transition: background 0.3s;
        }

        .hand-indicator.active .dot {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* ===== START OVERLAY ===== */
        .start-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.5s;
        }

        .start-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-overlay h1 {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -2px;
        }

        .start-overlay .subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 50px;
        }

        .start-btn {
            padding: 20px 60px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 16px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 30px rgba(99,102,241,0.4);
            position: relative;
            overflow: hidden;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(99,102,241,0.5);
        }

        .start-instructions {
            margin-top: 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            max-width: 480px;
        }

        .instruction-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .instruction-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .instruction-card .icon { font-size: 2rem; margin-bottom: 12px; }
        .instruction-card .label { font-size: 0.8rem; color: #777; line-height: 1.5; }

        /* ===== SETTINGS PANEL ===== */
        .settings-panel {
            position: fixed;
            top: 0; right: -340px;
            width: 340px;
            height: 100vh;
            z-index: 150;
            transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
            padding: 30px 24px;
            overflow-y: auto;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            color: #aaa;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 149;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-toggle:hover {
            border-color: var(--glass-highlight);
            color: #fff;
            transform: rotate(90deg);
        }

        .settings-panel h3 {
            font-size: 1.2rem;
            margin-bottom: 24px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-group label {
            display: block;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .setting-group select, .setting-group input[type="range"] {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .setting-group select:hover, .setting-group select:focus {
            border-color: var(--accent);
        }

        .setting-group input[type="range"] {
            padding: 0;
            height: 32px;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .setting-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(99,102,241,0.4);
        }

        .setting-group .value-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent);
            margin-top: 8px;
            text-align: right;
        }

        /* ===== RECORDER BAR ===== */
        .recorder-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            z-index: 50;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.4);
        }

        .rec-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .rec-btn:hover {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
        }

        .rec-btn.recording {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(239,68,68,0.1);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
        }

        .loop-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.4);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loop-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(99,102,241,0.15);
        }

        .loop-btn:hover {
            border-color: rgba(255,255,255,0.3);
        }

        .history-track {
            flex: 1;
            height: 52px;
            background: rgba(255,255,255,0.03);
            border-radius: 14px;
            overflow-x: auto;
            overflow-y: hidden;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 8px;
            scrollbar-width: thin;
        }

        .history-track::-webkit-scrollbar {
            height: 4px;
        }

        .history-track::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .history-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.45);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover {
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .history-item.active-loop {
            background: rgba(99,102,241,0.2);
            color: #a78bfa;
            border-color: rgba(99,102,241,0.3);
        }

        .clear-history-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.35);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clear-history-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ===== GESTURE TOAST ===== */
        .gesture-feedback {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 150;
        }

        .gesture-toast {
            padding: 12px 26px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            font-size: 0.95rem;
            color: #ddd;
            animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gesture-toast.up { border-color: var(--success); color: #6ee7b7; }
        .gesture-toast.down { border-color: var(--danger); color: #f87171; }
        .gesture-toast.mute { border-color: var(--warning); color: #fbbf24; }
        .gesture-toast.arpeggio { border-color: var(--accent); color: #a78bfa; }

        @keyframes toastIn {
            0% { transform: translateY(-30px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* ===== MUTE INDICATOR ===== */
        .mute-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            color: rgba(239,68,68,0.7);
            z-index: 120;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            filter: drop-shadow(0 0 40px rgba(239,68,68,0.3));
        }

        .mute-indicator.show {
            opacity: 1;
            animation: mutePulse 0.5s ease-out;
        }

        @keyframes mutePulse {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* ===== ARPEGGIO INDICATOR ===== */
        .arpeggio-indicator {
            position: fixed;
            top: 90px;
            right: 80px;
            font-size: 0.75rem;
            color: rgba(139,92,246,0.5);
            z-index: 120;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .arpeggio-indicator.active {
            color: #a78bfa;
            text-shadow: 0 0 20px rgba(167,139,250,0.4);
        }

        .arpeggio-indicator .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: arpBlink 1s infinite;
        }

        @keyframes arpBlink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ===== VOLUME INDICATOR ===== */
        .volume-indicator {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 120;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .volume-indicator.show {
            opacity: 1;
        }

        .volume-bar {
            width: 5px;
            background: linear-gradient(to top, var(--accent), #a78bfa);
            border-radius: 3px;
            transition: height 0.1s;
        }

        .volume-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            margin-top: 8px;
        }

        /* ===== AUDIO VISUALIZER ===== */
        .audio-viz {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 40px;
            z-index: 9;
            opacity: 0.6;
        }

        .audio-viz-bar {
            width: 4px;
            background: linear-gradient(to top, var(--accent), #a78bfa);
            border-radius: 2px;
            transition: height 0.08s;
        }

        /* ===== START OVERLAY ENHANCED ===== */
        .start-overlay {
            background: radial-gradient(ellipse at center, rgba(20,20,30,0.95) 0%, rgba(0,0,0,0.98) 70%);
        }

        .start-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(236,72,153,0.08) 0%, transparent 50%);
        }

        .start-overlay h1 {
            position: relative;
            z-index: 1;
        }

        .start-overlay .subtitle {
            position: relative;
            z-index: 1;
        }

        .start-btn {
            position: relative;
            z-index: 1;
        }

        .start-instructions {
            position: relative;
            z-index: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chord-display .chord-name { font-size: 3rem; }
            .wheel-label { font-size: 0.5rem; }
            .settings-panel { width: 100%; right: -100%; }
            .hand-indicator { display: none; }
        }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="particles"></canvas>
    <div class="dim-overlay"></div>
    <canvas id="overlay"></canvas>

    <div class="audio-viz" id="audioViz"></div>

    <div class="mute-indicator" id="muteIndicator">🔇</div>
    <div class="arpeggio-indicator" id="arpeggioIndicator"><span class="dot"></span>Arpeggio</div>
    <div class="volume-indicator" id="volumeIndicator"></div>

    <div class="wheel-label left" id="degreeLabel">Scale Degree</div>
    <div class="wheel-label right" id="qualityLabel">Chord Quality</div>
    <div class="hand-indicator left-hand" id="leftHand"><span class="dot"></span>Left Hand</div>
    <div class="hand-indicator right-hand" id="rightHand"><span class="dot"></span>Right Hand</div>

    <div class="chord-display glass-card" id="chordDisplay">
        <div class="chord-name" id="chordName">—</div>
        <div class="chord-notes" id="chordNotes"></div>
        <div class="key-display" id="keyDisplay">Key of C</div>
    </div>

    <div class="gesture-feedback" id="gestureFeedback"></div>

    <button class="settings-toggle" id="settingsToggle" title="Settings">⚙</button>
    <div class="settings-panel glass-card" id="settingsPanel">
        <h3>⚙ Settings</h3>
        <div class="setting-group">
            <label>Sound Preset</label>
            <select id="soundPreset">
                <option value="piano">Piano</option>
                <option value="organ">Organ</option>
                <option value="pad">Pad</option>
                <option value="synth">Synth</option>
                <option value="pluck">Pluck</option>
            </select>
        </div>
        <div class="setting-group">
            <label>Volume</label>
            <input type="range" id="volumeSlider" min="0" max="100" value="50">
            <div class="value-display" id="volumeValue">50%</div>
        </div>
        <div class="setting-group">
            <label>Octave Offset</label>
            <input type="range" id="octaveSlider" min="-2" max="2" value="0">
            <div class="value-display" id="octaveValue">0</div>
        </div>
        <div class="setting-group">
            <label>Arpeggio BPM</label>
            <input type="range" id="bpmSlider" min="60" max="240" value="120">
            <div class="value-display" id="bpmValue">120 BPM</div>
        </div>
        <div class="setting-group">
            <label>Reverb Mix</label>
            <input type="range" id="reverbSlider" min="0" max="100" value="30">
            <div class="value-display" id="reverbValue">30%</div>
        </div>
    </div>

    <div class="recorder-bar glass-card">
        <button class="rec-btn" id="recBtn" title="Record (R)">●</button>
        <button class="loop-btn" id="loopBtn" title="Loop (L)">↻</button>
        <div class="history-track" id="historyTrack"></div>
        <button class="clear-history-btn" id="clearHistoryBtn" title="Clear">✕</button>
    </div>

    <div class="start-overlay" id="startOverlay">
        <h1>ChordFlow</h1>
        <p class="subtitle">Hand-tracking chord controller with advanced audio</p>
        <button class="start-btn" id="startBtn">Start Camera</button>
        <div class="start-instructions">
            <div class="instruction-card">
                <div class="icon">✋</div>
                <div class="label">Left hand: Scale degree</div>
            </div>
            <div class="instruction-card">
                <div class="icon">✋</div>
                <div class="label">Right hand: Chord quality</div>
            </div>
            <div class="instruction-card">
                <div class="icon">✊</div>
                <div class="label">Fist = Mute</div>
            </div>
            <div class="instruction-card">
                <div class="icon">✌️</div>
                <div class="label">Peace = Arpeggio</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

    <script>
    (() => {
        // ========== CHORD THEORY ==========
        const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const DEGREE_LABELS = ['I','II','III','IV','V','VI','VII'];
        const QUALITIES = [
            { name:'maj',  label:'Major',  intervals:[0,4,7] },
            { name:'min',  label:'Minor',  intervals:[0,3,7] },
            { name:'dim',  label:'Dim',    intervals:[0,3,6] },
            { name:'aug',  label:'Aug',    intervals:[0,4,8] },
            { name:'7',    label:'7th',    intervals:[0,4,7,10] },
            { name:'maj7', label:'Maj7',   intervals:[0,4,7,11] },
            { name:'min7', label:'Min7',   intervals:[0,3,7,10] },
            { name:'sus2', label:'Sus2',   intervals:[0,2,7] },
            { name:'sus4', label:'Sus4',   intervals:[0,5,7] },
            { name:'add9', label:'Add9',   intervals:[0,4,7,14] },
        ];
        const MAJOR_SCALE = [0,2,4,5,7,9,11];
        const DEGREE_COLORS = ['#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899','#f43f5e','#f97316'];
        const QUALITY_COLORS = ['#3b82f6','#22c55e','#eab308','#f97316','#ef4444','#8b5cf6','#06b6d4','#84cc16','#f43f5e','#6366f1'];

        let currentKeyIndex = 0;
        let currentDegree = null;
        let currentQuality = null;
        let lastChordName = '';

        const getKey = () => NOTES[currentKeyIndex];
        const getDegreeNote = (d) => NOTES[(currentKeyIndex + MAJOR_SCALE[d]) % 12];
        const getChordNotes = (d,q) => QUALITIES[q].intervals.map(i => ((currentKeyIndex + MAJOR_SCALE[d]) % 12 + i) % 12);
        const getChordName = (d,q) => `${getDegreeNote(d)}${QUALITIES[q].name}`;
        const formatNotes = (n) => n.map(i => NOTES[i % 12]).join(' — ');
        const transposeUp = () => { currentKeyIndex = (currentKeyIndex + 1) % 12; updateKeyDisplay(); };
        const transposeDown = () => { currentKeyIndex = (currentKeyIndex + 11) % 12; updateKeyDisplay(); };
        const updateKeyDisplay = () => { document.getElementById('keyDisplay').textContent = `Key of ${getKey()}`; };

        // ========== SETTINGS ==========
        const settings = {
            soundPreset: 'piano',
            volume: 0.5,
            octaveOffset: 0,
            bpm: 120,
            reverbMix: 0.3,
            mute: false,
            arpeggioEnabled: false
        };

        // ========== AUDIO ENGINE ==========
        let audioCtx = null;
        let activeOsc = [];
        let activeGain = null;
        let convolver = null;
        let reverbGain = null;
        let dryGain = null;
        let masterGain = null;
        let arpeggioInterval = null;
        let arpeggioNotes = [];
        let arpeggioIndex = 0;
        let analyser = null;
        let vizData = new Uint8Array(32);

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            createMasterChain();
            createReverb();
            createVisualizer();
        }

        function resumeAudio() {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function createMasterChain() {
            masterGain = audioCtx.createGain();
            masterGain.gain.value = settings.volume;
            masterGain.connect(audioCtx.destination);
        }

        function createReverb() {
            if (!audioCtx) return;
            convolver = audioCtx.createConvolver();
            reverbGain = audioCtx.createGain();
            dryGain = audioCtx.createGain();
            
            const rate = audioCtx.sampleRate;
            const length = rate * 2;
            const impulse = audioCtx.createBuffer(2, length, rate);
            for (let channel = 0; channel < 2; channel++) {
                const data = impulse.getChannelData(channel);
                for (let i = 0; i < length; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 2.5);
                }
            }
            convolver.buffer = impulse;
            convolver.connect(reverbGain);
            reverbGain.connect(masterGain);
            dryGain.connect(masterGain);
        }

        function createVisualizer() {
            if (!audioCtx) return;
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 64;
            masterGain.connect(analyser);
        }

        function noteToFreq(ni) {
            return 440 * Math.pow(2, (ni + 60 + settings.octaveOffset * 12 - 69) / 12);
        }

        function getOscConfig(type) {
            const configs = {
                piano: { type: 'triangle', subType: 'sine', subGain: 0.15, detune: 0, filter: null },
                organ: { type: 'square', subType: 'square', subGain: 0.3, detune: 0, filter: { type: 'lowpass', freq: 800 } },
                pad: { type: 'sawtooth', subType: 'sawtooth', subGain: 0.4, detune: 5, filter: { type: 'lowpass', freq: 1200 } },
                synth: { type: 'sawtooth', subType: 'triangle', subGain: 0.35, detune: -5, filter: { type: 'lowpass', freq: 2000, resonance: 15 } },
                pluck: { type: 'triangle', subType: 'sine', subGain: 0.1, detune: 0, filter: { type: 'lowpass', freq: 3000 } }
            };
            return configs[type] || configs.piano;
        }

        function playChord(noteIndices) {
            if (settings.mute || !noteIndices || noteIndices.length === 0) {
                arpeggioNotes = [];
                stopArpeggio();
                return;
            }
            resumeAudio();
            stopChord();
            if (!audioCtx) return;

            if (settings.arpeggioEnabled) {
                arpeggioNotes = [...noteIndices];
                arpeggioIndex = 0;
                startArpeggio();
                return;
            }

            const config = getOscConfig(settings.soundPreset);
            const now = audioCtx.currentTime;

            activeGain = audioCtx.createGain();
            activeGain.gain.setValueAtTime(0, now);
            activeGain.gain.linearRampToValueAtTime(settings.volume * 0.4, now + 0.03);
            activeGain.gain.exponentialRampToValueAtTime(settings.volume * 0.35, now + 0.15);
            activeGain.gain.exponentialRampToValueAtTime(settings.volume * 0.08, now + 1.5);
            
            if (dryGain) activeGain.connect(dryGain);
            if (settings.reverbMix > 0.01) {
                const revSend = audioCtx.createGain();
                revSend.gain.value = settings.reverbMix * 0.6;
                activeGain.connect(revSend);
                revSend.connect(convolver);
            }

            noteIndices.forEach(ni => {
                const freq = noteToFreq(ni);
                const osc = audioCtx.createOscillator();
                osc.type = config.type;
                osc.frequency.value = freq;
                osc.detune.value = config.detune;

                const oG = audioCtx.createGain();
                oG.gain.value = config.type === 'sawtooth' ? 0.35 : 0.5;

                if (config.filter) {
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = config.filter.type;
                    filter.frequency.value = config.filter.freq;
                    if (config.filter.resonance) filter.Q.value = config.filter.resonance;
                    osc.connect(oG).connect(filter).connect(activeGain);
                } else {
                    osc.connect(oG).connect(activeGain);
                }

                if (config.subType) {
                    const sub = audioCtx.createOscillator();
                    sub.type = config.subType;
                    sub.frequency.value = freq * 0.5;
                    const sG = audioCtx.createGain();
                    sG.gain.value = config.subGain;
                    sub.connect(sG).connect(activeGain);
                    osc.start(); sub.start();
                    activeOsc.push(osc, sub);
                } else {
                    osc.start();
                    activeOsc.push(osc);
                }
            });
        }

        function startArpeggio() {
            stopArpeggio();
            if (arpeggioNotes.length === 0) return;
            resumeAudio();
            const config = getOscConfig(settings.soundPreset);
            const intervalMs = 60000 / settings.bpm / 2;
            
            function playArpNote() {
                if (arpeggioNotes.length === 0 || settings.mute) return;
                const note = arpeggioNotes[arpeggioIndex % arpeggioNotes.length];
                const freq = noteToFreq(note);
                
                const osc = audioCtx.createOscillator();
                osc.type = config.type;
                osc.frequency.value = freq;
                osc.detune.value = config.detune;
                
                const oG = audioCtx.createGain();
                const now = audioCtx.currentTime;
                oG.gain.setValueAtTime(0, now);
                oG.gain.linearRampToValueAtTime(settings.volume * 0.35, now + 0.015);
                oG.gain.exponentialRampToValueAtTime(0.001, now + intervalMs * 0.9);
                
                if (config.filter) {
                    const filter = audioCtx.createBiquadFilter();
                    filter.type = config.filter.type;
                    filter.frequency.value = config.filter.freq;
                    if (config.filter.resonance) filter.Q.value = config.filter.resonance;
                    osc.connect(oG).connect(filter).connect(dryGain);
                } else {
                    osc.connect(oG).connect(dryGain);
                }
                
                osc.start();
                activeOsc.push(osc);
                
                arpeggioIndex++;
            }
            
            playArpNote();
            arpeggioInterval = setInterval(playArpNote, intervalMs);
        }

        function stopArpeggio() {
            if (arpeggioInterval) {
                clearInterval(arpeggioInterval);
                arpeggioInterval = null;
            }
        }

        function stopChord() {
            stopArpeggio();
            if (activeGain) {
                const now = audioCtx.currentTime;
                activeGain.gain.linearRampToValueAtTime(0, now + 0.1);
                activeGain = null;
            }
            activeOsc.forEach(o => { try { o.stop(audioCtx.currentTime + 0.15); } catch(e) {} });
            activeOsc = [];
        }

        function toggleMute() {
            settings.mute = !settings.mute;
            const indicator = document.getElementById('muteIndicator');
            if (settings.mute) {
                indicator.classList.add('show');
                stopChord();
                showToast('mute', '🔇 Mute ON');
            } else {
                indicator.classList.remove('show');
                showToast('mute', '🔊 Mute OFF');
            }
        }

        function toggleArpeggio() {
            settings.arpeggioEnabled = !settings.arpeggioEnabled;
            const indicator = document.getElementById('arpeggioIndicator');
            if (settings.arpeggioEnabled) {
                indicator.classList.add('active');
                if (currentDegree !== null && currentQuality !== null) {
                    arpeggioNotes = getChordNotes(currentDegree, currentQuality);
                    if (audioCtx) startArpeggio();
                }
                showToast('arpeggio', '🎵 Arpeggio ON');
            } else {
                indicator.classList.remove('active');
                stopArpeggio();
                showToast('arpeggio', '⏸ Arpeggio OFF');
            }
        }

        // ========== VISUALIZER ==========
        function updateVisualizer() {
            if (!analyser) return;
            analyser.getByteFrequencyData(vizData);
            const viz = document.getElementById('audioViz');
            viz.innerHTML = '';
            for (let i = 0; i < 32; i++) {
                const bar = document.createElement('div');
                bar.className = 'audio-viz-bar';
                const h = Math.max(4, (vizData[i] / 255) * 40);
                bar.style.height = h + 'px';
                viz.appendChild(bar);
            }
        }

        // ========== PARTICLES ==========
        const particleCanvas = document.getElementById('particles');
        const pCtx = particleCanvas.getContext('2d');
        let particles = [];

        function resizeParticles() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeParticles);
        resizeParticles();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 4 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1; this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.vy += 0.05;
                this.life -= this.decay; this.size *= 0.98;
            }
            draw() {
                pCtx.globalAlpha = this.life;
                pCtx.fillStyle = this.color;
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                pCtx.fill();
            }
        }

        function spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
        }

        function updateParticles() {
            pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            pCtx.globalAlpha = 1;
        }

        // ========== HISTORY / RECORDER ==========
        let history = [];
        let isRecording = false;
        let recordedSequence = [];
        let loopStart = 0, loopEnd = 0, isLooping = false, loopTimer = null;

        function addToHistory(chordName, notes) {
            history.push({ name: chordName, notes: notes, time: Date.now() });
            if (history.length > 50) history.shift();
            renderHistory();
            if (isRecording) recordedSequence.push({ name: chordName, notes: notes, time: Date.now() });
        }

        function renderHistory() {
            const track = document.getElementById('historyTrack');
            track.innerHTML = '';
            history.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'history-item';
                if (isLooping && i >= loopStart && i < loopEnd) el.classList.add('active-loop');
                el.textContent = item.name;
                el.title = item.notes.join(' — ');
                el.onclick = () => playHistoryItem(item);
                track.appendChild(el);
            });
            track.scrollLeft = track.scrollWidth;
        }

        function playHistoryItem(item) {
            if (!audioCtx) initAudio();
            const notes = item.notes.map(n => NOTES.indexOf(n));
            playChord(notes);
            setTimeout(stopChord, 800);
        }

        function toggleRecord() {
            isRecording = !isRecording;
            const btn = document.getElementById('recBtn');
            if (isRecording) {
                recordedSequence = [];
                btn.classList.add('recording');
                showToast('rec', '● Recording...');
            } else {
                btn.classList.remove('recording');
                showToast('rec', `Recorded ${recordedSequence.length} chords`);
            }
        }

        function toggleLoop() {
            const btn = document.getElementById('loopBtn');
            isLooping = !isLooping;
            btn.classList.toggle('active', isLooping);
            if (isLooping) {
                loopStart = Math.max(0, history.length - 8);
                loopEnd = history.length;
                startLoopPlayback();
                showToast('loop', '↻ Looping');
            } else {
                stopLoopPlayback();
                showToast('loop', 'Loop OFF');
            }
        }

        function startLoopPlayback() {
            stopLoopPlayback();
            if (loopStart >= loopEnd) return;
            let idx = loopStart;
            function playNext() {
                if (!isLooping) return;
                if (idx >= loopEnd) idx = loopStart;
                const item = history[idx];
                if (item) {
                    const notes = item.notes.map(n => NOTES.indexOf(n));
                    playChord(notes);
                    setTimeout(stopChord, 600);
                }
                idx++;
                loopTimer = setTimeout(playNext, 60000 / settings.bpm);
            }
            playNext();
        }

        function stopLoopPlayback() {
            if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
        }

        function clearHistory() {
            history = []; recordedSequence = [];
            renderHistory();
            stopLoopPlayback();
            isLooping = false;
            document.getElementById('loopBtn').classList.remove('active');
        }

        // ========== VOLUME VISUALIZER ==========
        function showVolumeIndicator() {
            const indicator = document.getElementById('volumeIndicator');
            indicator.classList.add('show');
            const bars = 12;
            indicator.innerHTML = '';
            for (let i = 0; i < bars; i++) {
                const bar = document.createElement('div');
                bar.className = 'volume-bar';
                bar.style.height = Math.max(4, Math.random() * settings.volume * 40) + 'px';
                indicator.appendChild(bar);
            }
            const val = document.createElement('div');
            val.className = 'volume-value';
            val.textContent = Math.round(settings.volume * 100) + '%';
            indicator.appendChild(val);
            clearTimeout(showVolumeIndicator._timer);
            showVolumeIndicator._timer = setTimeout(() => indicator.classList.remove('show'), 1500);
        }

        // ========== HAND TRACKING ==========
        let hands = null, camera = null;
        let leftFingertip = null, rightFingertip = null;
        let lastLandmarks = null;

        function initHandTracking() {
            const video = document.getElementById('webcam');
            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
            });
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.5,
            });
            hands.onResults(onResults);
            camera = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                width: 1280, height: 720,
            });
            camera.start();
        }

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                lastLandmarks = results.multiHandLandmarks;
                // First detected hand = left hand (controls degree wheel)
                if (results.multiHandLandmarks[0]) {
                    leftFingertip = { x: results.multiHandLandmarks[0][8].x, y: results.multiHandLandmarks[0][8].y };
                    updateHandIndicator('left', true);
                    detectLeftHandGesture(results.multiHandLandmarks[0]);
                } else {
                    leftFingertip = null;
                    updateHandIndicator('left', false);
                }
                // Second detected hand = right hand (controls quality wheel)
                if (results.multiHandLandmarks[1]) {
                    rightFingertip = { x: results.multiHandLandmarks[1][8].x, y: results.multiHandLandmarks[1][8].y };
                    updateHandIndicator('right', true);
                    detectRightHandGesture(results.multiHandLandmarks[1]);
                } else {
                    rightFingertip = null;
                    updateHandIndicator('right', false);
                }
            } else {
                lastLandmarks = null;
                leftFingertip = null;
                rightFingertip = null;
                updateHandIndicator('left', false);
                updateHandIndicator('right', false);
            }
        }

        function updateHandIndicator(side, active) {
            const el = document.getElementById(side + 'Hand');
            if (active) el.classList.add('active');
            else el.classList.remove('active');
        }

        function detectLeftHandGesture(lm) {
            const now = Date.now();
            const wrist = lm[0], thumbTip = lm[4];
            const indexTip = lm[8], middleTip = lm[12], ringTip = lm[16], pinkyTip = lm[20];
            const indexMcp = lm[5], middleMcp = lm[9], ringMcp = lm[13], pinkyMcp = lm[17];

            // Fist = mute
            const curled = indexTip.y > indexMcp.y && middleTip.y > middleMcp.y && ringTip.y > ringMcp.y && pinkyTip.y > pinkyMcp.y;
            if (curled && now - (gestureState.lastFist || 0) > 1500) {
                gestureState.lastFist = now;
                toggleMute();
                return;
            }

            // Thumbs up/down
            if (thumbTip.y < wrist.y - 0.1 && (now - gestureState.lastThumbsUp > 1200)) {
                gestureState.lastThumbsUp = now;
                transposeUp();
                showToast('up', `👍 Key up → ${getKey()}`);
            }
            if (thumbTip.y > wrist.y + 0.1 && (now - gestureState.lastThumbsDown > 1200)) {
                gestureState.lastThumbsDown = now;
                transposeDown();
                showToast('down', `👎 Key down → ${getKey()}`);
            }
        }

        function detectRightHandGesture(lm) {
            const now = Date.now();
            const indexTip = lm[8], middleTip = lm[12], ringTip = lm[16], pinkyTip = lm[20];
            const indexMcp = lm[5], middleMcp = lm[9], ringMcp = lm[13], pinkyMcp = lm[17];

            // Peace sign = arpeggio toggle
            const peace = indexTip.y < indexMcp.y && middleTip.y < middleMcp.y && ringTip.y > ringMcp.y && pinkyTip.y > pinkyMcp.y;
            if (peace && now - (gestureState.lastPeace || 0) > 1500) {
                gestureState.lastPeace = now;
                toggleArpeggio();
                return;
            }
        }

        const gestureState = { lastThumbsUp: 0, lastThumbsDown: 0, lastFist: 0, lastPeace: 0, lastVolumeChange: 0 };

        // ========== WHEEL GEOMETRY ==========
        const degreeWheel = { cx: 0.22, cy: 0.42, outerR: 0.16, innerR: 0.07 };
        const qualityWheel = { cx: 0.78, cy: 0.42, outerR: 0.16, innerR: 0.07 };

        function getWheelPixel(w) {
            const s = Math.min(window.innerWidth, window.innerHeight);
            return { cx: w.cx * window.innerWidth, cy: w.cy * window.innerHeight, outerR: w.outerR * s, innerR: w.innerR * s };
        }

        // ========== RENDER ==========
        const overlayCanvas = document.getElementById('overlay');
        const ctx = overlayCanvas.getContext('2d');
        let pulsePhase = 0;

        function resize() {
            overlayCanvas.width = window.innerWidth;
            overlayCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function hexToRGBA(hex, a) {
            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            return `rgba(${r},${g},${b},${a})`;
        }

        function drawWheel(w, segments, colors, activeIdx, labels) {
            const p = getWheelPixel(w);
            const sliceAngle = (Math.PI * 2) / segments;
            pulsePhase += 0.02;

            for (let i = 0; i < segments; i++) {
                const start = -Math.PI/2 + i * sliceAngle;
                const end = start + sliceAngle;
                const isActive = i === activeIdx;
                const pulse = isActive ? 1 + Math.sin(pulsePhase * 3) * 0.05 : 1;

                ctx.beginPath();
                ctx.arc(p.cx, p.cy, p.outerR * pulse, start, end);
                ctx.arc(p.cx, p.cy, Math.max(p.innerR, p.innerR * pulse), end, start, true);
                ctx.closePath();

                ctx.fillStyle = hexToRGBA(colors[i % colors.length], isActive ? 0.9 : 0.22);
                ctx.fill();

                if (isActive) {
                    ctx.save();
                    ctx.shadowColor = colors[i % colors.length];
                    ctx.shadowBlur = 35;
                    ctx.fillStyle = hexToRGBA(colors[i % colors.length], 0.5);
                    ctx.fill();
                    ctx.restore();
                }

                ctx.strokeStyle = isActive ? colors[i % colors.length] : 'rgba(255,255,255,0.08)';
                ctx.lineWidth = isActive ? 2.5 : 0.5;
                ctx.stroke();

                // Label
                const la = start + sliceAngle / 2;
                const lr = (p.outerR + p.innerR) / 2;
                const lx = p.cx + Math.cos(la) * lr;
                const ly = p.cy + Math.sin(la) * lr;

                ctx.save();
                ctx.translate(lx, ly);
                ctx.fillStyle = isActive ? '#fff' : 'rgba(255,255,255,0.35)';
                ctx.font = isActive ? `bold ${Math.max(11, p.outerR * 0.09)}px "JetBrains Mono"` : `${Math.max(9, p.outerR * 0.07)}px "JetBrains Mono"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const lines = labels[i].split('\n');
                lines.forEach((line, li) => {
                    ctx.fillText(line, 0, (li - (lines.length-1)/2) * (isActive ? 15 : 12));
                });
                ctx.restore();
            }

            // Center
            ctx.beginPath();
            ctx.arc(p.cx, p.cy, Math.max(p.innerR - 3, 3), 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawFingertip(fx, fy) {
            const sx = (1 - fx) * overlayCanvas.width;
            const sy = fy * overlayCanvas.height;
            const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 40);
            grad.addColorStop(0, 'rgba(99,102,241,0.5)');
            grad.addColorStop(1, 'rgba(99,102,241,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(sx, sy, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawHandSkeleton(landmarks) {
            const connections = [
                [0,1],[1,2],[2,3],[3,4],
                [0,5],[5,6],[6,7],[7,8],
                [5,9],[9,10],[10,11],[11,12],
                [9,13],[13,14],[14,15],[15,16],
                [13,17],[17,18],[18,19],[19,20],
                [0,17]
            ];

            ctx.strokeStyle = 'rgba(139,92,246,0.25)';
            ctx.lineWidth = 2;
            landmarks.forEach(lm => {
                connections.forEach(([a,b]) => {
                    const ax = (1 - lm[a].x) * overlayCanvas.width;
                    const ay = lm[a].y * overlayCanvas.height;
                    const bx = (1 - lm[b].x) * overlayCanvas.width;
                    const by = lm[b].y * overlayCanvas.height;
                    ctx.beginPath();
                    ctx.moveTo(ax, ay);
                    ctx.lineTo(bx, by);
                    ctx.stroke();
                });
            });

            landmarks.forEach(lm => {
                lm.forEach((pt, i) => {
                    const x = (1 - pt.x) * overlayCanvas.width;
                    const y = pt.y * overlayCanvas.height;
                    ctx.beginPath();
                    ctx.arc(x, y, i === 8 ? 6 : 3, 0, Math.PI * 2);
                    ctx.fillStyle = i === 8 ? '#6366f1' : 'rgba(139,92,246,0.4)';
                    ctx.fill();
                });
            });
        }

        // ========== HIT DETECTION ==========
        let lockedDegree = null, lockedQuality = null;

        function hitTestWheel(fx, fy, w, segments) {
            const video = document.getElementById('webcam');
            const vw = video.videoWidth || 1280;
            const vh = video.videoHeight || 720;
            const sw = window.innerWidth;
            const sh = window.innerHeight;

            const videoAspect = vw / vh;
            const screenAspect = sw / sh;
            let scaleX, scaleY;

            if (screenAspect > videoAspect) {
                scaleX = 1.0;
                scaleY = screenAspect / videoAspect;
            } else {
                scaleX = videoAspect / screenAspect;
                scaleY = 1.0;
            }

            const sx = (1 - fx) * sw;
            const sy = fy * sh;

            const p = getWheelPixel(w);

            const dx = sx - p.cx;
            const dy = sy - p.cy;
            const dist = Math.sqrt(dx*dx + dy*dy);

            const hitInner = p.innerR * 0.7;
            const hitOuter = p.outerR * 1.15;

            if (dist >= hitInner && dist <= hitOuter) {
                let angle = Math.atan2(dy, dx) + Math.PI / 2;
                if (angle < 0) angle += Math.PI * 2;
                let idx = Math.floor(angle / (Math.PI * 2 / segments));
                if (idx >= segments) idx = segments - 1;
                return idx;
            }
            return null;
        }

        function processFrame() {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            if (lastLandmarks) {
                drawHandSkeleton(lastLandmarks);
            }

            // Left hand -> degree wheel
            if (leftFingertip) {
                const dHit = hitTestWheel(leftFingertip.x, leftFingertip.y, degreeWheel, 7);
                if (dHit !== null) lockedDegree = dHit;
                drawFingertip(leftFingertip.x, leftFingertip.y);
            }

            // Right hand -> quality wheel
            if (rightFingertip) {
                const qHit = hitTestWheel(rightFingertip.x, rightFingertip.y, qualityWheel, QUALITIES.length);
                if (qHit !== null) lockedQuality = qHit;
                drawFingertip(rightFingertip.x, rightFingertip.y);
            }

            currentDegree = lockedDegree;
            currentQuality = lockedQuality;

            const chordDisplay = document.getElementById('chordDisplay');
            if (currentDegree !== null && currentQuality !== null) {
                const cn = getChordName(currentDegree, currentQuality);
                const notes = getChordNotes(currentDegree, currentQuality);
                if (cn !== lastChordName) {
                    lastChordName = cn;
                    playChord(notes);
                    addToHistory(cn, notes.map(ni => NOTES[ni % 12]));
                    chordDisplay.classList.add('active');
                    document.getElementById('chordName').textContent = cn;
                    document.getElementById('chordNotes').textContent = formatNotes(notes);
                    spawnParticles(overlayCanvas.width/2, overlayCanvas.height * 0.6, DEGREE_COLORS[currentDegree], 20);
                    setTimeout(() => chordDisplay.classList.remove('active'), 200);
                }
            } else if (currentDegree !== null && currentQuality === null) {
                document.getElementById('chordName').textContent = `${getDegreeNote(currentDegree)}?`;
                document.getElementById('chordNotes').textContent = 'Select quality →';
                if (lastChordName !== '') { lastChordName = ''; stopChord(); }
            } else if (currentQuality !== null) {
                document.getElementById('chordName').textContent = `?${QUALITIES[currentQuality].name}`;
                document.getElementById('chordNotes').textContent = 'Select degree ←';
                if (lastChordName !== '') { lastChordName = ''; stopChord(); }
            } else {
                if (lastChordName !== '') {
                    lastChordName = '';
                    stopChord();
                    document.getElementById('chordName').textContent = '—';
                    document.getElementById('chordNotes').textContent = '';
                }
            }

            const degreeLabels = DEGREE_LABELS.map((l,i) => `${l}\n${getDegreeNote(i)}`);
            const qualityLabels = QUALITIES.map(q => q.label);

            drawWheel(degreeWheel, 7, DEGREE_COLORS, currentDegree, degreeLabels);
            drawWheel(qualityWheel, QUALITIES.length, QUALITY_COLORS, currentQuality, qualityLabels);

            const dl = document.getElementById('degreeLabel');
            const ql = document.getElementById('qualityLabel');
            const dp = getWheelPixel(degreeWheel);
            const qp = getWheelPixel(qualityWheel);
            dl.style.top = (dp.cy - dp.outerR - 28) + 'px';
            dl.style.left = dp.cx + 'px';
            dl.style.transform = 'translateX(-50%)';
            ql.style.top = (qp.cy - qp.outerR - 28) + 'px';
            ql.style.left = qp.cx + 'px';
            ql.style.transform = 'translateX(-50%)';

            updateVisualizer();
            updateParticles();
            requestAnimationFrame(processFrame);
        }

        function updateVolumeUI() {
            document.getElementById('volumeSlider').value = settings.volume * 100;
            document.getElementById('volumeValue').textContent = Math.round(settings.volume * 100) + '%';
            if (masterGain) masterGain.gain.value = settings.volume;
        }

        function showToast(type, text) {
            const c = document.getElementById('gestureFeedback');
            const t = document.createElement('div');
            t.className = `gesture-toast ${type}`;
            t.textContent = text;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2200);
        }

        // ========== UI EVENT LISTENERS ==========
        document.getElementById('startBtn').addEventListener('click', () => {
            initAudio();
            initHandTracking();
            document.getElementById('startOverlay').classList.add('hidden');
            processFrame();
        });

        document.getElementById('settingsToggle').addEventListener('click', () => {
            document.getElementById('settingsPanel').classList.toggle('open');
        });

        document.getElementById('soundPreset').addEventListener('change', (e) => {
            settings.soundPreset = e.target.value;
        });

        document.getElementById('volumeSlider').addEventListener('input', (e) => {
            settings.volume = e.target.value / 100;
            document.getElementById('volumeValue').textContent = e.target.value + '%';
            if (masterGain) masterGain.gain.value = settings.volume;
        });

        document.getElementById('octaveSlider').addEventListener('input', (e) => {
            settings.octaveOffset = parseInt(e.target.value);
            document.getElementById('octaveValue').textContent = (settings.octaveOffset >= 0 ? '+' : '') + settings.octaveOffset;
        });

        document.getElementById('bpmSlider').addEventListener('input', (e) => {
            settings.bpm = parseInt(e.target.value);
            document.getElementById('bpmValue').textContent = settings.bpm + ' BPM';
            if (isLooping) {
                stopLoopPlayback();
                startLoopPlayback();
            }
        });

        document.getElementById('reverbSlider').addEventListener('input', (e) => {
            settings.reverbMix = e.target.value / 100;
            document.getElementById('reverbValue').textContent = e.target.value + '%';
        });

        document.getElementById('recBtn').addEventListener('click', toggleRecord);
        document.getElementById('loopBtn').addEventListener('click', toggleLoop);
        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); toggleMute(); }
            if (e.code === 'KeyA') { e.preventDefault(); toggleArpeggio(); }
            if (e.code === 'KeyR') { e.preventDefault(); toggleRecord(); }
            if (e.code === 'KeyL') { e.preventDefault(); toggleLoop(); }
            if (e.code === 'Escape') { document.getElementById('settingsPanel').classList.remove('open'); }
        });

    })();
    </script>
</body>
