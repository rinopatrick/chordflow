<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChordFlow — Hand-Tracking Chord Controller</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            color: #e0e0e0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        #webcam {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
        }

        .chord-display {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .chord-display .chord-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 40px rgba(99,102,241,0.6), 0 0 80px rgba(139,92,246,0.3);
            min-height: 5rem;
            letter-spacing: -2px;
        }

        .chord-display .chord-notes {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        .chord-display .key-display {
            margin-top: 10px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .wheel-label {
            position: fixed;
            z-index: 10;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.3);
            font-weight: 600;
            pointer-events: none;
        }

        .wheel-label.left {
            top: 30px;
            left: 50%;
            transform: translateX(-200px);
        }

        .wheel-label.right {
            top: 30px;
            left: 50%;
            transform: translateX(60px);
        }

        /* === START OVERLAY === */
        .start-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.6s;
        }

        .start-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .start-overlay h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .start-overlay p {
            color: #555;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .start-btn {
            padding: 16px 48px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99,102,241,0.4);
        }

        .start-instructions {
            margin-top: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            max-width: 440px;
        }

        .instruction-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 18px 14px;
            text-align: center;
        }

        .instruction-card .icon { font-size: 1.6rem; margin-bottom: 8px; }
        .instruction-card .label { font-size: 0.75rem; color: #777; line-height: 1.5; }

        /* === GESTURE TOAST === */
        .gesture-feedback {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 150;
        }

        .gesture-toast {
            padding: 10px 22px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-size: 0.9rem;
            color: #ccc;
            animation: toastIn 0.3s ease-out;
            font-weight: 600;
        }

        .gesture-toast.up { border-color: #22c55e; color: #4ade80; }
        .gesture-toast.down { border-color: #ef4444; color: #f87171; }

        @keyframes toastIn {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .dim-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.25);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    <div class="dim-overlay"></div>
    <canvas id="overlay"></canvas>

    <div class="wheel-label left" id="degreeLabel">Scale Degree</div>
    <div class="wheel-label right" id="qualityLabel">Chord Quality</div>

    <div class="chord-display">
        <div class="chord-name" id="chordName">—</div>
        <div class="chord-notes" id="chordNotes"></div>
        <div class="key-display" id="keyDisplay">Key of C</div>
    </div>

    <div class="gesture-feedback" id="gestureFeedback"></div>

    <div class="start-overlay" id="startOverlay">
        <h1>ChordFlow</h1>
        <p>Hand-tracking chord controller</p>
        <button class="start-btn" id="startBtn">Start Camera</button>
        <div class="start-instructions">
            <div class="instruction-card">
                <div class="icon">👆</div>
                <div class="label">Point at left wheel for scale degree (I–VII)</div>
            </div>
            <div class="instruction-card">
                <div class="icon">👉</div>
                <div class="label">Point at right wheel for chord quality</div>
            </div>
            <div class="instruction-card">
                <div class="icon">👍</div>
                <div class="label">Thumbs up = transpose key up</div>
            </div>
            <div class="instruction-card">
                <div class="icon">👎</div>
                <div class="label">Thumbs down = transpose key down</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

    <script>
    (() => {
        // ========== CHORD THEORY ==========
        const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const DEGREE_LABELS = ['I','II','III','IV','V','VI','VII'];
        const QUALITIES = [
            { name:'maj',  label:'Major',  intervals:[0,4,7] },
            { name:'min',  label:'Minor',  intervals:[0,3,7] },
            { name:'dim',  label:'Dim',    intervals:[0,3,6] },
            { name:'aug',  label:'Aug',    intervals:[0,4,8] },
            { name:'7',    label:'7th',    intervals:[0,4,7,10] },
            { name:'maj7', label:'Maj7',   intervals:[0,4,7,11] },
            { name:'min7', label:'Min7',   intervals:[0,3,7,10] },
            { name:'sus2', label:'Sus2',   intervals:[0,2,7] },
            { name:'sus4', label:'Sus4',   intervals:[0,5,7] },
            { name:'add9', label:'Add9',   intervals:[0,4,7,14] },
        ];
        const MAJOR_SCALE = [0,2,4,5,7,9,11];
        const DEGREE_COLORS = ['#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899','#f43f5e','#f97316'];
        const QUALITY_COLORS = ['#3b82f6','#22c55e','#eab308','#f97316','#ef4444','#8b5cf6','#06b6d4','#84cc16','#f43f5e','#6366f1'];

        let currentKeyIndex = 0;
        let currentDegree = null;
        let currentQuality = null;
        let lastChordName = '';

        const getKey = () => NOTES[currentKeyIndex];
        const getDegreeNote = (d) => NOTES[(currentKeyIndex + MAJOR_SCALE[d]) % 12];
        const getChordNotes = (d,q) => QUALITIES[q].intervals.map(i => ((currentKeyIndex + MAJOR_SCALE[d]) % 12 + i) % 12);
        const getChordName = (d,q) => `${getDegreeNote(d)}${QUALITIES[q].name}`;
        const formatNotes = (n) => n.map(i => NOTES[i % 12]).join(' — ');
        const transposeUp = () => { currentKeyIndex = (currentKeyIndex + 1) % 12; updateKeyDisplay(); };
        const transposeDown = () => { currentKeyIndex = (currentKeyIndex + 11) % 12; updateKeyDisplay(); };
        const updateKeyDisplay = () => { document.getElementById('keyDisplay').textContent = `Key of ${getKey()}`; };

        // ========== AUDIO ==========
        let audioCtx = null;
        let activeOsc = [];
        let activeGain = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function noteToFreq(ni) {
            return 440 * Math.pow(2, (ni + 60 - 69) / 12);
        }

        function playChord(noteIndices) {
            stopChord();
            if (!audioCtx) return;

            activeGain = audioCtx.createGain();
            activeGain.gain.setValueAtTime(0, audioCtx.currentTime);
            activeGain.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.04);
            activeGain.connect(audioCtx.destination);

            noteIndices.forEach(ni => {
                const osc = audioCtx.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = noteToFreq(ni);

                const sub = audioCtx.createOscillator();
                sub.type = 'sine';
                sub.frequency.value = noteToFreq(ni);

                const oG = audioCtx.createGain(); oG.gain.value = 0.5;
                const sG = audioCtx.createGain(); sG.gain.value = 0.25;

                osc.connect(oG).connect(activeGain);
                sub.connect(sG).connect(activeGain);
                osc.start(); sub.start();
                activeOsc.push(osc, sub);
            });
        }

        function stopChord() {
            if (activeGain) {
                activeGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
                activeGain = null;
            }
            activeOsc.forEach(o => { try { o.stop(audioCtx.currentTime + 0.1); } catch(e) {} });
            activeOsc = [];
        }

        // ========== WHEEL GEOMETRY ==========
        // Wheels are defined in normalized screen coordinates (0-1)
        const degreeWheel = { cx: 0.22, cy: 0.42, outerR: 0.16, innerR: 0.07 };
        const qualityWheel = { cx: 0.78, cy: 0.42, outerR: 0.16, innerR: 0.07 };

        function getWheelPixel(w) {
            const s = Math.min(window.innerWidth, window.innerHeight);
            return {
                cx: w.cx * window.innerWidth,
                cy: w.cy * window.innerHeight,
                outerR: w.outerR * s,
                innerR: w.innerR * s
            };
        }

        // ========== RENDER ==========
        const overlayCanvas = document.getElementById('overlay');
        const ctx = overlayCanvas.getContext('2d');

        function resize() {
            overlayCanvas.width = window.innerWidth;
            overlayCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function hexToRGBA(hex, a) {
            const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
            return `rgba(${r},${g},${b},${a})`;
        }

        function drawWheel(w, segments, colors, activeIdx, labels) {
            const p = getWheelPixel(w);
            const sliceAngle = (Math.PI * 2) / segments;

            for (let i = 0; i < segments; i++) {
                const start = -Math.PI/2 + i * sliceAngle;
                const end = start + sliceAngle;
                const isActive = i === activeIdx;

                ctx.beginPath();
                ctx.arc(p.cx, p.cy, p.outerR, start, end);
                ctx.arc(p.cx, p.cy, p.innerR, end, start, true);
                ctx.closePath();

                ctx.fillStyle = hexToRGBA(colors[i % colors.length], isActive ? 0.85 : 0.2);
                ctx.fill();

                if (isActive) {
                    ctx.save();
                    ctx.shadowColor = colors[i % colors.length];
                    ctx.shadowBlur = 30;
                    ctx.fillStyle = hexToRGBA(colors[i % colors.length], 0.6);
                    ctx.fill();
                    ctx.restore();
                }

                ctx.strokeStyle = isActive ? colors[i % colors.length] : 'rgba(255,255,255,0.08)';
                ctx.lineWidth = isActive ? 2 : 0.5;
                ctx.stroke();

                // Label
                const la = start + sliceAngle / 2;
                const lr = (p.outerR + p.innerR) / 2;
                const lx = p.cx + Math.cos(la) * lr;
                const ly = p.cy + Math.sin(la) * lr;

                ctx.save();
                ctx.translate(lx, ly);
                ctx.fillStyle = isActive ? '#fff' : 'rgba(255,255,255,0.35)';
                ctx.font = isActive ? `bold ${Math.max(12, p.outerR * 0.1)}px "JetBrains Mono"` : `${Math.max(10, p.outerR * 0.08)}px "JetBrains Mono"`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const lines = labels[i].split('\n');
                lines.forEach((line, li) => {
                    ctx.fillText(line, 0, (li - (lines.length-1)/2) * (isActive ? 16 : 13));
                });
                ctx.restore();
            }

            // Center
            ctx.beginPath();
            ctx.arc(p.cx, p.cy, p.innerR - 2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.6)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function drawFingertip(fx, fy) {
            // Draw a soft glow at fingertip position on overlay
            const sx = (1 - fx) * overlayCanvas.width;  // mirror X
            const sy = fy * overlayCanvas.height;
            const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 30);
            grad.addColorStop(0, 'rgba(99,102,241,0.6)');
            grad.addColorStop(1, 'rgba(99,102,241,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(sx, sy, 30, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawHandSkeleton(landmarks) {
            const connections = [
                [0,1],[1,2],[2,3],[3,4],
                [0,5],[5,6],[6,7],[7,8],
                [5,9],[9,10],[10,11],[11,12],
                [9,13],[13,14],[14,15],[15,16],
                [13,17],[17,18],[18,19],[19,20],
                [0,17]
            ];

            ctx.strokeStyle = 'rgba(139,92,246,0.3)';
            ctx.lineWidth = 2;
            connections.forEach(([a,b]) => {
                const ax = (1 - landmarks[a].x) * overlayCanvas.width;
                const ay = landmarks[a].y * overlayCanvas.height;
                const bx = (1 - landmarks[b].x) * overlayCanvas.width;
                const by = landmarks[b].y * overlayCanvas.height;
                ctx.beginPath();
                ctx.moveTo(ax, ay);
                ctx.lineTo(bx, by);
                ctx.stroke();
            });

            landmarks.forEach((lm, i) => {
                const x = (1 - lm.x) * overlayCanvas.width;
                const y = lm.y * overlayCanvas.height;
                ctx.beginPath();
                ctx.arc(x, y, i === 8 ? 5 : 2.5, 0, Math.PI * 2);
                ctx.fillStyle = i === 8 ? '#6366f1' : 'rgba(139,92,246,0.5)';
                ctx.fill();
            });
        }

        // ========== HAND TRACKING ==========
        let hands = null;
        let camera = null;
        let fingertipPos = null;
        let lastLandmarks = null;
        let gestureState = { lastThumbsUp: 0, lastThumbsDown: 0 };

        function initHandTracking() {
            const video = document.getElementById('webcam');

            hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.5,
            });

            hands.onResults((results) => {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    lastLandmarks = lm;
                    fingertipPos = { x: lm[8].x, y: lm[8].y };
                    detectThumbGesture(lm);
                } else {
                    lastLandmarks = null;
                    fingertipPos = null;
                    currentDegree = null;
                    currentQuality = null;
                    if (lastChordName !== '') {
                        lastChordName = '';
                        stopChord();
                        document.getElementById('chordName').textContent = '—';
                        document.getElementById('chordNotes').textContent = '';
                    }
                }
            });

            camera = new Camera(video, {
                onFrame: async () => { await hands.send({ image: video }); },
                width: 1280,
                height: 720,
            });

            camera.start();
        }

        function detectThumbGesture(lm) {
            const now = Date.now();
            const wrist = lm[0], thumbTip = lm[4];
            const indexTip = lm[8], middleTip = lm[12], ringTip = lm[16], pinkyTip = lm[20];
            const indexMcp = lm[5], middleMcp = lm[9], ringMcp = lm[13], pinkyMcp = lm[17];

            const curled = indexTip.y > indexMcp.y && middleTip.y > middleMcp.y && ringTip.y > ringMcp.y && pinkyTip.y > pinkyMcp.y;

            if (curled) {
                if (thumbTip.y < wrist.y - 0.1 && (now - gestureState.lastThumbsUp > 1200)) {
                    gestureState.lastThumbsUp = now;
                    transposeUp();
                    showToast('up', `👍 Key up → ${getKey()}`);
                }
                if (thumbTip.y > wrist.y + 0.1 && (now - gestureState.lastThumbsDown > 1200)) {
                    gestureState.lastThumbsDown = now;
                    transposeDown();
                    showToast('down', `👎 Key down → ${getKey()}`);
                }
            }
        }

        // ========== HIT DETECTION (normalized coords) ==========
        function hitTestWheel(fx, fy, w, segments) {
            // Convert finger pos to screen (mirrored)
            const sx = (1 - fx) * window.innerWidth;
            const sy = fy * window.innerHeight;
            const p = getWheelPixel(w);

            const dx = sx - p.cx;
            const dy = sy - p.cy;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist >= p.innerR && dist <= p.outerR) {
                let angle = Math.atan2(dy, dx) + Math.PI / 2;
                if (angle < 0) angle += Math.PI * 2;
                let idx = Math.floor(angle / (Math.PI * 2 / segments));
                if (idx >= segments) idx = segments - 1;
                return idx;
            }
            return null;
        }

        function processFrame() {
            // Clear overlay
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            // Draw hand skeleton
            if (lastLandmarks) {
                drawHandSkeleton(lastLandmarks);
            }

            // Hit test wheels
            if (fingertipPos) {
                currentDegree = hitTestWheel(fingertipPos.x, fingertipPos.y, degreeWheel, 7);
                currentQuality = hitTestWheel(fingertipPos.x, fingertipPos.y, qualityWheel, QUALITIES.length);

                drawFingertip(fingertipPos.x, fingertipPos.y);

                if (currentDegree !== null && currentQuality !== null) {
                    const cn = getChordName(currentDegree, currentQuality);
                    const notes = getChordNotes(currentDegree, currentQuality);
                    if (cn !== lastChordName) {
                        lastChordName = cn;
                        playChord(notes);
                        document.getElementById('chordName').textContent = cn;
                        document.getElementById('chordNotes').textContent = formatNotes(notes);
                    }
                } else if (currentDegree !== null || currentQuality !== null) {
                    // Only one wheel selected — show partial
                    if (currentDegree !== null && currentQuality === null) {
                        const partial = `${getDegreeNote(currentDegree)}?`;
                        document.getElementById('chordName').textContent = partial;
                        document.getElementById('chordNotes').textContent = 'Select a quality →';
                    } else if (currentQuality !== null) {
                        document.getElementById('chordName').textContent = `?${QUALITIES[currentQuality].name}`;
                        document.getElementById('chordNotes').textContent = 'Select a degree ←';
                    }
                    if (lastChordName !== '') {
                        lastChordName = '';
                        stopChord();
                    }
                } else {
                    if (lastChordName !== '') {
                        lastChordName = '';
                        stopChord();
                        document.getElementById('chordName').textContent = '—';
                        document.getElementById('chordNotes').textContent = '';
                    }
                }
            } else {
                currentDegree = null;
                currentQuality = null;
            }

            // Draw wheels
            const degreeLabels = DEGREE_LABELS.map((l,i) => `${l}\n${getDegreeNote(i)}`);
            const qualityLabels = QUALITIES.map(q => q.label);

            drawWheel(degreeWheel, 7, DEGREE_COLORS, currentDegree, degreeLabels);
            drawWheel(qualityWheel, QUALITIES.length, QUALITY_COLORS, currentQuality, qualityLabels);

            // Update label positions
            const dl = document.getElementById('degreeLabel');
            const ql = document.getElementById('qualityLabel');
            const dp = getWheelPixel(degreeWheel);
            const qp = getWheelPixel(qualityWheel);
            dl.style.top = (dp.cy - dp.outerR - 28) + 'px';
            dl.style.left = dp.cx + 'px';
            dl.style.transform = 'translateX(-50%)';
            ql.style.top = (qp.cy - qp.outerR - 28) + 'px';
            ql.style.left = qp.cx + 'px';
            ql.style.transform = 'translateX(-50%)';

            requestAnimationFrame(processFrame);
        }

        // ========== TOAST ==========
        function showToast(type, text) {
            const c = document.getElementById('gestureFeedback');
            const t = document.createElement('div');
            t.className = `gesture-toast ${type}`;
            t.textContent = text;
            c.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        // ========== START ==========
        document.getElementById('startBtn').addEventListener('click', () => {
            initAudio();
            initHandTracking();
            document.getElementById('startOverlay').classList.add('hidden');
            processFrame();
        });
    })();
    </script>
</body>
</html>
